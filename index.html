<!DOCTYPE html>
<html>
  <head>
    <title>Markleft</title>
  </head>

  <body>

    <h1><u>Playground</u></h1>

    <textarea id="input" rows="25" cols="90"></textarea>

    <h2>Output:</h2>
    <div id="output"></div>

    <hr>
    <h1><u>Showcase</u></h1>
    <div id="showcase">loading...</div>

    <br>

    <h1><u>Showcase Source</u></h1>
    <div id="showcase-src">loading...</div>

    <script type="module">
      import { parseMarkleft } from "./markleft-parser.js";

      const input = document.querySelector("#input");
      const output = document.querySelector("#output");
      const showcase = document.querySelector("#showcase")
      const showcaseSrc = document.querySelector("#showcase-src")

      input.addEventListener("input", () => {
        output.innerHTML = parseMarkleft(input.value).html;
      });

      fetch("showcase.markl")
        .then((response) => response.text())
        .then((markleft) => {
          showcase.innerHTML = parseMarkleft(markleft).html;
        });

      fetch("showcase.markl")
        .then((response) => response.text())
        .then((markleft) => {
          showcaseSrc.innerHTML = "<code><pre></pre></code>";

          const pre = showcaseSrc.querySelector("pre");
          pre.textContent = markleft;
        });
    </script>
  </body>
</html>
