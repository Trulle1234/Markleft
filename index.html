<!DOCTYPE html>
<html>
  <head>
    <title>Markleft</title>
  </head>

  <body>

    <h1><u>Playground</u></h1>

    <textarea id="input" rows="25" cols="90"></textarea>

    <h3>Output:</h3>
    <div id="output"></div>
    <br>

    <hr>
    <h1><u>Showcase</u></h1>

    <div id="showcase">loading...</div>

    <script type="module">
      import { parseMarkdown } from "./markleft-parser.js";

      const input = document.querySelector("#input");
      const output = document.querySelector("#output");
      const showcase = document.querySelector("#showcase")

      input.addEventListener("input", () => {
        output.innerHTML = parseMarkdown(input.value);
      });

      fetch("showcase.markl")
        .then((response) => response.text())
        .then((markdown) => {
          showcase.innerHTML = parseMarkdown(markdown);
        });
    </script>
  </body>
</html>
